services:
  - type: web
    name: material-control-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: MATERIAL_APP_SECRET
        generateValue: true
      - key: MATERIAL_DATA_DIR
        value: /var/data
    disk:
      name: material-data
      mountPath: /var/data
      sizeGB: 1
